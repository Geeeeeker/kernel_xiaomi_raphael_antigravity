generate_release_notes: true
env:
GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

- name: Create Pre-release (on manual dispatch)
if: github.event_name == 'workflow_dispatch' && github.event.inputs.kernel_version != ''
uses: softprops/action-gh-release@v1
with:
files: release/${{ env.release_zip }}
tag_name: ${{ github.event.inputs.kernel_version }}
name: ${{ github.event.inputs.kernel_version }}
body: |
# Kernel Build ${{ github.event.inputs.kernel_version }}

- Built from branch: `${{ github.event.inputs.kernel_branch || env.KERNEL_BRANCH }}`
- Toolchain: `${{ env.TOOLCHAIN_NAME }}`
- Build type: `${{ github.event.inputs.build_type || 'release' }}`

## Files
- `Image.gz-dtb`: Bootable kernel image
- `kernel_config.conf`: Kernel configuration
- `build.log`: Full build log
prerelease: true
generate_release_notes: true
env:
GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

- name: Create/Update Latest Release (always)
if: github.event_name == 'workflow_dispatch' && github.event.inputs.kernel_version == ''
uses: softprops/action-gh-release@v1
with:
files: release/${{ env.release_zip }}
tag_name: latest-build
name: Latest Build
body: |
# Latest Kernel Build

Updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
Build ID: ${{ github.run_id }}

- Built from branch: `${{ github.event.inputs.kernel_branch || env.KERNEL_BRANCH }}`
- Toolchain: `${{ env.TOOLCHAIN_NAME }}`
- Build type: `${{ github.event.inputs.build_type || 'release' }}`

## Download
Download the zip file and extract `Image.gz-dtb` to flash with fastboot.
prerelease: false
generate_release_notes: false
env:
GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

verify-build:
needs: build-kernel
runs-on: ubuntu-latest
if: always()
steps:
- name: Check build status
run: |
if [ "${{ needs.build-kernel.result }}" == "success" ]; then
echo "✅ Kernel build successful"
echo "Download artifacts from the build summary above"
else
echo "❌ Kernel build failed"
echo "Check the build logs for errors"
exit 1
fi

- name: Show build summary
run: |
echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
echo "- **Status**: ${{ needs.build-kernel.result }}" >> $GITHUB_STEP_SUMMARY
echo "- **Branch**: ${{ github.event.inputs.kernel_branch || env.KERNEL_BRANCH }}" >> $GITHUB_STEP_SUMMARY
echo "- **Toolchain**: ${{ env.TOOLCHAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
echo "- **Build ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
echo "" >> $GITHUB_STEP_SUMMARY
echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
echo "- 📦 kernel-build-${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
echo "- ⚙️ kernel-config-${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
