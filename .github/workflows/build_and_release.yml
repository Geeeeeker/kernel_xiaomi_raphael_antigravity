name: Official Docker Kernel Build (16.0-SUSFS / clang-r547379)

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  # ---- 固定配置 ----
  KERNEL_SOURCE_REPO: https://github.com/SOVIET-ANDROID/kernel_xiaomi_raphael
  KERNEL_BRANCH: 16.0-SUSFS
  TOOLCHAIN_TARBALL_URL: https://github.com/Geeeeeker/boot/releases/download/clang-prebuilts-20260319-031015/clang-r547379.tar.gz
  TOOLCHAIN_DIR_NAME: clang-r547379

jobs:
  build-with-official-docker:
    runs-on: ubuntu-latest
    # Docker 构建方式本身需要较长时间（官方预计 10-20 分钟），请预留足够时间
    timeout-minutes: 60

    steps:
      # 1. 检出你自己的配置文件 (包含 Dockerfile 和 build_docker.sh)
      - name: Checkout antigravity configs
        uses: actions/checkout@v4
        with:
          path: antigravity-configs
          fetch-depth: 1

      # 2. 检出要编译的内核源码 (16.0-SUSFS 分支)
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: SOVIET-ANDROID/kernel_xiaomi_raphael
          path: kernel_source
          ref: ${{ env.KERNEL_BRANCH }}
          fetch-depth: 1

      # 3. 下载 clang-r547379 工具链到宿主机
      - name: Download toolchain
        run: |
          echo ">>> 正在下载 clang-r547379 工具链 ..."
          mkdir -p /opt/android-kernel
          wget -q --show-progress "${{ env.TOOLCHAIN_TARBALL_URL }}" -O /opt/android-kernel/toolchain.tar.gz
          mkdir -p /opt/android-kernel/${{ env.TOOLCHAIN_DIR_NAME }}
          tar -xzf /opt/android-kernel/toolchain.tar.gz -C /opt/android-kernel/${{ env.TOOLCHAIN_DIR_NAME }}
          echo ">>> 工具链已就绪。"

      # 4. 准备 Docker 构建环境 (Dockerfile 来自你的仓库)
      - name: Prepare Docker build environment
        run: |
          echo ">>> 复制构建脚本和配置 ..."
          cp antigravity-configs/Dockerfile kernel_source/
          cp antigravity-configs/build_docker.sh kernel_source/
          # 确保 docker.config 存在 (你的仓库里应该有)
          cp antigravity-configs/docker.config kernel_source/ 2>/dev/null || echo ">>> 未找到 docker.config，将使用内核自带的 defconfig。"

      # 5. 构建 Docker 镜像 (按照 BUILD.md 中的官方步骤)
      - name: Build the Docker image
        run: |
          echo ">>> 正在构建 Docker 镜像 (android-kernel-builder) ..."
          cd kernel_source
          docker build -t android-kernel-builder .
          echo ">>> 镜像构建完成。"

      # 6. 在 Docker 容器内执行官方编译
      - name: Run kernel build inside Docker
        run: |
          echo ">>> 在 Docker 容器内启动内核编译 ..."
          # 完全按照 BUILD.md 中的 Docker run 逻辑：
          # 将内核源码和工具链挂载进容器，并运行 build_docker.sh
          docker run --rm \
            --name soviet-kernel-builder \
            -v ${{ github.workspace }}/kernel_source:/kernel/soviet_kernel_stock \
            -v /opt/android-kernel/${{ env.TOOLCHAIN_DIR_NAME }}:/opt/clang \
            --tmpfs /tmp/build:rw,size=4G,mode=1777 \
            android-kernel-builder \
            bash /kernel/soviet_kernel_stock/build_docker.sh
          echo ">>> Docker 编译流程结束。"

      # 7. 归档编译产物 (Image.gz-dtb)
      - name: Create release artifact
        run: |
          echo ">>> 正在准备发布包 ..."
          mkdir -p release
          # 编译产物路径与 build_docker.sh 输出对应
          cp kernel_source/out/arch/arm64/boot/Image.gz-dtb release/
          cp kernel_source/out/.config release/kernel_config.txt
          cd release
          zip -r Kernel-Docker-Official-$(date +%Y%m%d-%H%M).zip .
          echo ">>> 发布包已生成。"
        shell: bash

      # 8. 上传构建产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-docker-official-build-${{ github.run_id }}
          path: release/Kernel-Docker-Official-*.zip

      # 9. (可选) 将产物发布到 Release 页面
      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: release/Kernel-Docker-Official-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
