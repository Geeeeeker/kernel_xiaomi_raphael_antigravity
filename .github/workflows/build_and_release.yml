name: Optimized Kernel Build for Redmi K20 Pro

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: '内核源码分支'
        required: true
        default: '16.0-SUSFS'
        type: string

env:
  KERNEL_SOURCE_REPO: https://github.com/SOVIET-ANDROID/kernel_xiaomi_raphael
  TOOLCHAIN_URL: https://github.com/Geeeeeker/boot/releases/download/clang-prebuilts-20260319-031015/clang-r547379.tar.gz
  TOOLCHAIN_DIR_NAME: clang-r547379

jobs:
  build:
    runs-on: ubuntu-latest
    # 使用轻量级Debian镜像作为执行环境，避免依赖冲突
    container:
      image: debian:bookworm-slim

    steps:
      # 1. 检出你当前的Kernel配置仓库
      - name: 检出 antigravity 配置
        uses: actions/checkout@v4
        with:
          path: antigravity-configs

      # 2. 检出SOVIET-ANDROID内核源码，明确指定分支为 16.0-SUSFS
      - name: 检出内核源码
        uses: actions/checkout@v4
        with:
          repository: SOVIET-ANDROID/kernel_xiaomi_raphael
          path: kernel_source
          ref: 16.0-SUSFS  # 显式指定分支名

      # 3. 安装编译所需的基础工具链
      - name: 安装基础依赖
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            build-essential bc bison flex libssl-dev \
            libncurses5-dev git curl wget ca-certificates \
            python3 ccache cpio xz-utils lld llvm
          # 清理缓存减小体积
          rm -rf /var/lib/apt/lists/*

      # 4. 下载并配置指定的clang工具链
      - name: 配置编译工具链
        run: |
          echo ">>> 下载 clang-r547379..."
          mkdir -p /opt/android-kernel
          wget -q --show-progress "${TOOLCHAIN_URL}" -O /opt/android-kernel/toolchain.tar.gz
          tar -xzf /opt/android-kernel/toolchain.tar.gz -C /opt/android-kernel/${TOOLCHAIN_DIR_NAME}
          echo ">>> 工具链已就绪"
          # 验证工具链
          /opt/android-kernel/${TOOLCHAIN_DIR_NAME}/bin/clang --version

      # 5. 编译内核
      - name: 编译内核
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="/opt/android-kernel/${TOOLCHAIN_DIR_NAME}/bin:${PATH}"
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export LD=ld.lld

          cd kernel_source
          make O=out ARCH=arm64 raphael_docker_defconfig
          make O=out ARCH=arm64 olddefconfig
          
          echo ">>> 开始编译内核..."
          make O=out ARCH=arm64 -j$(nproc) 2>&1 | tee build.log
          
          # 检查编译产物
          if [ ! -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "::error::编译失败，未找到 Image.gz-dtb"
            exit 1
          fi
          echo ">>> 编译成功！"

      # 6. 打包并上传编译产物
      - name: 上传内核镜像
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: kernel_source/out/arch/arm64/boot/Image.gz-dtb
